version: 2

models:
  # ---------------------------------------------------------------------------
  # FX
  # ---------------------------------------------------------------------------
  - name: int_olist__fx_rates_filled
    description: >
      Gap-filled daily BRL->USD/EUR rates over the full order/FX extent (LOCF
      forward-fill + leading back-fill). Grain = (calendar_date, quote_currency).
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [calendar_date, quote_currency]
    columns:
      - name: calendar_date
        data_tests: [not_null]
      - name: quote_currency
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [USD, EUR]
      - name: rate
        description: BRL->quote rate. not_null is the fail-loud FX-coverage guard.
        data_tests: [not_null]

  # ---------------------------------------------------------------------------
  # Collapsed / enriched grains
  # ---------------------------------------------------------------------------
  - name: int_olist__payments_pivoted
    description: One row per order — payment rollup + dominant method.
    columns:
      - name: order_id
        data_tests: [unique, not_null]
      - name: total_payment_value
        data_tests: [not_null]
      - name: primary_payment_type
        data_tests:
          - accepted_values:
              arguments:
                values: [credit_card, boleto, voucher, debit_card, not_defined]

  - name: int_olist__reviews_deduped
    description: One review per order (latest wins). order_id unique; review_id is not.
    columns:
      - name: order_id
        data_tests: [unique, not_null]
      - name: review_score
        data_tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false

  - name: int_olist__products_enriched
    description: Products + English category (NULL when untranslated = kept signal).
    columns:
      - name: product_id
        data_tests: [unique, not_null]

  - name: int_olist__orders_enriched
    description: >
      Order-grain hub feeding fct_orders: delivery metrics, payment rollup, review,
      FX conversion, and the 3-state payment-reconciliation flag.
    columns:
      - name: order_id
        data_tests: [unique, not_null]
      - name: customer_id
        description: FK to stg_olist__customers.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__customers')
                field: customer_id
      - name: primary_payment_type
        description: NULL for orders with no payment (accepted_values ignores nulls).
        data_tests:
          - accepted_values:
              arguments:
                values: [credit_card, boleto, voucher, debit_card, not_defined]
      - name: review_score
        data_tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false

  # ---------------------------------------------------------------------------
  # Rejects (auditable quarantine)
  # ---------------------------------------------------------------------------
  - name: int_olist__rejects
    description: >
      Consolidated quarantine of genuinely-broken rows (ADR-009). Reconciliation
      mismatches are flagged in orders_enriched, NOT quarantined here.
    columns:
      - name: source_model
        data_tests: [not_null]
      - name: business_key
        data_tests: [not_null]
      - name: reject_reason
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  [orphan_order_item, orphan_order_payment,
                   orphan_order_review, order_no_payment]

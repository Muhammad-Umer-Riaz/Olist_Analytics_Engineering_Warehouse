name: 'olist_dbt'
version: '1.0.0'
config-version: 2

# Which profile (in profiles.yml) holds the Snowflake connection for this project.
profile: 'olist_dbt'

# Layer config. Staging models are 1:1 cleaned VIEWS that land in the STAGING schema.
# The +schema here is used verbatim because macros/generate_schema_name.sql overrides
# dbt's default "<target>_<custom>" concatenation.
models:
  olist_dbt:
    staging:
      +materialized: view
      +schema: STAGING
    # Intermediate models are business-logic VIEWS in the INTERMEDIATE schema.
    # +schema is used verbatim (see macros/generate_schema_name.sql) so they land
    # in INTERMEDIATE, not INTERMEDIATE_INTERMEDIATE.
    intermediate:
      +materialized: view
      +schema: INTERMEDIATE
    # Marts are the star schema (dims + facts + customer_summary). Materialized as
    # TABLES (BI reads them repeatedly; upstream is all views) in the MARTS schema.
    marts:
      +materialized: table
      +schema: MARTS

# Seeds = static reference CSVs (br_holidays feeds dim_dates). The transformer role
# cannot write RAW or create schemas (ADR-012), so the seed lands in STAGING as
# cleaned reference data. +schema is verbatim (generate_schema_name override).
seeds:
  olist_dbt:
    +schema: STAGING
    br_holidays:
      # Pin types so holiday_date lands as a true DATE (dim_dates joins on it).
      +column_types:
        holiday_date: date
        holiday_name: varchar
